<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>flâneur — the route a smart local would take</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f7f4ef;
      --surface:   #ffffff;
      --border:    #e2ddd6;
      --text:      #1c1a17;
      --muted:     #7a7368;
      --accent:    #c96a35;
      --accent-lt: #f5e8de;
      --green:     #3a7d5a;
      --green-lt:  #f0f8f4;
      --radius:    14px;
      --shadow:    0 2px 16px rgba(0,0,0,.07);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 52px 24px 36px;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 7vw, 4.2rem);
      font-weight: 400;
      letter-spacing: -0.01em;
    }
    header p {
      margin-top: 8px;
      font-size: .85rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    /* ── Form ── */
    .form-wrap { max-width: 560px; margin: 0 auto; padding: 0 20px; }
    .form-card  { padding: 30px 26px 26px; }

    .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }

    /* autocomplete wrapper */
    .ac-wrap { position: relative; }

    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0 14px;
      transition: border-color .18s;
    }
    .input-row:focus-within { border-color: var(--accent); }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-from { background: var(--accent); }
    .dot-to   { background: var(--text); }
    .input-row input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 14px 0;
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      color: var(--text);
      outline: none;
    }
    .input-row input::placeholder { color: #b5afa8; }

    /* ── Autocomplete dropdown ── */
    .ac-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      z-index: 100;
      overflow: hidden;
      display: none;
    }
    .ac-dropdown.open { display: block; }
    .ac-item {
      padding: 11px 14px;
      font-size: .88rem;
      cursor: pointer;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      line-height: 1.35;
      transition: background .12s;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.highlighted { background: var(--accent-lt); }
    .ac-item .ac-main { font-weight: 500; }
    .ac-item .ac-sub  { font-size: .78rem; color: var(--muted); margin-top: 1px; }

    /* ── Preferences ── */
    .prefs-label {
      font-size: .72rem; font-weight: 600;
      letter-spacing: .09em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }
    .prefs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 26px; position: relative; z-index: 10; }
    .pref-btn {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: .82rem;
      color: var(--muted);
      cursor: pointer;
      transition: all .16s ease;
      user-select: none;
    }
    .pref-btn:hover { border-color: var(--accent); color: var(--accent); }
    .pref-btn.active {
      background: var(--accent-lt);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Submit ── */
    .submit-btn {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      background: var(--text);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: .02em;
      transition: background .18s, transform .1s;
    }
    .submit-btn:hover:not(:disabled) { background: #2d2a25; }
    .submit-btn:active:not(:disabled) { transform: scale(.99); }
    .submit-btn:disabled { background: #c4bdb6; cursor: not-allowed; }

    /* ── Loading ── */
    .loading-wrap { max-width: 560px; margin: 28px auto 0; padding: 0 20px; display: none; }
    .loading-wrap.visible { display: block; }
    .loading-card { padding: 28px 24px; text-align: center; }
    .spinner {
      width: 34px; height: 34px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .75s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-steps { list-style: none; font-size: .84rem; color: var(--muted); line-height: 2.1; }
    .loading-steps li.done   { color: var(--green); }
    .loading-steps li.done::before   { content: '✓  '; }
    .loading-steps li.active { color: var(--text); font-weight: 500; }
    .loading-steps li.active::before { content: '→  '; }

    /* ── Error ── */
    .error-banner { max-width: 560px; margin: 20px auto 0; padding: 0 20px; display: none; }
    .error-banner.visible { display: block; }
    .error-inner {
      background: #fff0ed; border: 1px solid #f5c5b8;
      border-radius: 10px; padding: 14px 18px;
      font-size: .88rem; color: #b04020; line-height: 1.5;
    }

    /* ── Results ── */
    .results-wrap { max-width: 560px; margin: 30px auto 0; padding: 0 20px; display: none; }
    .results-wrap.visible { display: flex; flex-direction: column; gap: 14px; }
    .results-header { margin-bottom: 4px; }
    .results-header h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 400; }
    .results-header small { color: var(--muted); font-size: .8rem; }

    /* ── Route card ── */
    .route-card {
      padding: 22px 22px 18px;
      position: relative;
      opacity: 0;
      transform: translateY(10px);
      animation: cardIn .35s ease forwards;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .route-card:nth-child(1) { animation-delay: .05s; }
    .route-card:nth-child(2) { animation-delay: .15s; }
    .route-card:nth-child(3) { animation-delay: .25s; }

    .route-card:hover { box-shadow: 0 4px 22px rgba(0,0,0,.1); transition: box-shadow .2s; }
    .route-card.recommended { border-color: var(--green); background: var(--green-lt); }

    .rec-badge {
      display: none;
      position: absolute; top: -1px; right: 16px;
      background: var(--green); color: #fff;
      font-size: .65rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 0 0 8px 8px;
    }
    .route-card.recommended .rec-badge { display: block; }

    .route-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px; margin-bottom: 14px;
    }
    .route-title { font-family: 'Playfair Display', serif; font-size: 1.08rem; font-weight: 600; line-height: 1.3; }
    .route-meta  { text-align: right; flex-shrink: 0; }
    .route-duration { font-size: 1.05rem; font-weight: 600; }
    .route-cost     { font-size: .78rem; color: var(--muted); margin-top: 2px; }

    .route-legs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .leg-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 999px;
      background: var(--surface); border: 1px solid var(--border);
      font-size: .78rem;
    }
    .route-card.recommended .leg-pill { background: #fff; }
    .leg-icon { font-size: .9rem; line-height: 1; }

    .flaneur-take {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-size: .9rem;
      line-height: 1.65; color: var(--muted);
      border-top: 1px solid var(--border); padding-top: 12px;
    }
    .flaneur-take::before { content: '\201C'; color: var(--accent); font-size: 1.1rem; }
    .flaneur-take::after  { content: '\201D'; color: var(--accent); font-size: 1.1rem; }

    /* ── Share bar ── */
    .share-bar {
      max-width: 560px; margin: 0 auto; padding: 0 20px;
      display: none;
    }
    .share-bar.visible { display: block; }
    .share-inner {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
    }
    .share-url {
      flex: 1; font-size: .8rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: 'Inter', sans-serif;
    }
    .share-copy {
      flex-shrink: 0; padding: 6px 12px;
      border-radius: 6px; border: 1.5px solid var(--border);
      background: transparent; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: .78rem;
      font-weight: 500; color: var(--muted);
      transition: all .15s;
    }
    .share-copy:hover { border-color: var(--accent); color: var(--accent); }
    .share-copy.copied { border-color: var(--green); color: var(--green); }

    footer {
      text-align: center; margin-top: 52px;
      font-size: .72rem; color: #c4bdb6; letter-spacing: .05em;
    }

    @media (max-width: 480px) {
      header { padding: 36px 20px 24px; }
      .form-card { padding: 20px 16px 18px; }
      .route-card { padding: 18px 16px 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>flâneur</h1>
  <p>the route a smart local would take</p>
</header>

<main>
  <div class="form-wrap">
    <div class="form-card card">

      <div class="input-group">
        <div class="ac-wrap" id="ac-wrap-from">
          <div class="input-row">
            <span class="dot dot-from"></span>
            <input id="origin" type="text" placeholder="From — street, landmark or suburb" autocomplete="off" />
          </div>
          <div class="ac-dropdown" id="ac-from"></div>
        </div>

        <div class="ac-wrap" id="ac-wrap-to">
          <div class="input-row">
            <span class="dot dot-to"></span>
            <input id="destination" type="text" placeholder="To — where are you headed?" autocomplete="off" />
          </div>
          <div class="ac-dropdown" id="ac-to"></div>
        </div>
      </div>

      <p class="prefs-label">Your vibe</p>
      <div class="prefs">
        <button class="pref-btn" data-pref="walk" onclick="this.classList.toggle('active')">🚶 walk a bit</button>
        <button class="pref-btn" data-pref="scenic" onclick="this.classList.toggle('active')">🌿 take the scenic option</button>
        <button class="pref-btn" data-pref="speed" onclick="this.classList.toggle('active')">⚡ prioritise speed</button>
        <button class="pref-btn" data-pref="cheap" onclick="this.classList.toggle('active')">💸 keep it cheap</button>
      </div>

      <button class="submit-btn" id="findBtn">Find my route</button>
    </div>
  </div>

  <div class="loading-wrap" id="loadingWrap">
    <div class="loading-card card">
      <div class="spinner"></div>
      <ul class="loading-steps">
        <li id="step-dirs">Fetching route options</li>
        <li id="step-advice">Consulting the local</li>
        <li id="step-render">Preparing your routes</li>
      </ul>
    </div>
  </div>

  <div class="error-banner" id="errorBanner">
    <div class="error-inner" id="errorText"></div>
  </div>

  <div class="share-bar" id="shareBar">
    <div class="share-inner">
      <span class="share-url" id="shareUrl"></span>
      <button class="share-copy" id="shareCopy">Copy link</button>
    </div>
  </div>

  <div class="results-wrap" id="resultsWrap">
    <div class="results-header">
      <h2>Your routes</h2>
      <small id="routeSubhead"></small>
    </div>
    <div id="routeCards"></div>
  </div>
</main>

<footer>flâneur &nbsp;·&nbsp; move like you belong</footer>

<script>
  const PROXY = 'https://flaneur-proxy.onrender.com';

  /* ── Session token for Places billing ── */
  let sessionToken = crypto.randomUUID();

  /* ── Autocomplete ── */
  function setupAutocomplete(inputId, dropdownId) {
    const input    = document.getElementById(inputId);
    const dropdown = document.getElementById(dropdownId);
    let debounce, highlighted = -1, suggestions = [];

    const close = () => {
      dropdown.classList.remove('open');
      highlighted = -1;
    };

    const render = (preds) => {
      suggestions = preds;
      if (!preds.length) { close(); return; }
      dropdown.innerHTML = preds.map((p, i) => {
        const main = p.structured_formatting?.main_text   || p.description;
        const sub  = p.structured_formatting?.secondary_text || '';
        return `<div class="ac-item" data-i="${i}">
          <div class="ac-main">${main}</div>
          ${sub ? `<div class="ac-sub">${sub}</div>` : ''}
        </div>`;
      }).join('');
      dropdown.classList.add('open');

      dropdown.querySelectorAll('.ac-item').forEach(el => {
        el.addEventListener('mousedown', e => {
          e.preventDefault();
          select(parseInt(el.dataset.i));
        });
      });
    };

    const select = (i) => {
      input.value = suggestions[i]?.description || '';
      sessionToken = crypto.randomUUID(); // new token after selection
      close();
    };

    const highlight = (dir) => {
      const items = dropdown.querySelectorAll('.ac-item');
      if (!items.length) return;
      items[highlighted]?.classList.remove('highlighted');
      highlighted = (highlighted + dir + items.length) % items.length;
      items[highlighted]?.classList.add('highlighted');
    };

    input.addEventListener('input', () => {
      clearTimeout(debounce);
      const q = input.value.trim();
      if (q.length < 2) { close(); return; }
      debounce = setTimeout(async () => {
        try {
          const r = await fetch(
            `${PROXY}/autocomplete?input=${encodeURIComponent(q)}&sessiontoken=${sessionToken}`
          );
          const d = await r.json();
          render(d.predictions || []);
        } catch { close(); }
      }, 280);
    });

    input.addEventListener('keydown', e => {
      if (!dropdown.classList.contains('open')) return;
      if (e.key === 'ArrowDown')  { e.preventDefault(); highlight(1); }
      if (e.key === 'ArrowUp')    { e.preventDefault(); highlight(-1); }
      if (e.key === 'Enter' && highlighted >= 0) { e.preventDefault(); select(highlighted); }
      if (e.key === 'Escape')     close();
    });

  }

  setupAutocomplete('origin', 'ac-from');
  setupAutocomplete('destination', 'ac-to');

  // Close any open dropdown when clicking outside an ac-wrap
  document.addEventListener('mousedown', e => {
    if (!e.target.closest('.ac-wrap')) {
      document.querySelectorAll('.ac-dropdown').forEach(d => d.classList.remove('open'));
    }
  });

  /* ── Prefs ── */
  document.querySelectorAll('.pref-btn').forEach(btn =>
    btn.addEventListener('click', () => btn.classList.toggle('active'))
  );
  const activePrefs = () =>
    [...document.querySelectorAll('.pref-btn.active')].map(b => b.dataset.pref);

  /* ── Step indicator ── */
  const setStep = (id, state) => {
    const el = document.getElementById(id);
    if (el) el.className = state;
  };

  /* ── Icon map ── */
  const ICON_MAP = {
    'ti-walk': '🚶', 'ti-bus': '🚌', 'ti-train': '🚆',
    'ti-car': '🚕', 'ti-tram': '🚊', 'ti-ferry': '⛴️',
    'walk': '🚶', 'transit': '🚇', 'driving': '🚕',
  };
  const icon = s => ICON_MAP[s] || '🗺️';

  /* ── Summarise directions for prompt ── */
  function summarise(result, mode) {
    if (!result?.routes?.length) return `${mode}: not available`;
    const leg  = result.routes[0].legs[0];
    const dur  = leg?.duration?.text  || '?';
    const dist = leg?.distance?.text  || '?';
    const fare = result.routes[0].fare
      ? `fare ~${result.routes[0].fare.currency}${result.routes[0].fare.value}` : '';
    const steps = (leg?.steps || []).slice(0, 8).map(s => {
      if (s.transit_details) {
        const td = s.transit_details;
        const line = td.line?.short_name || td.line?.name || '';
        const vtype = td.line?.vehicle?.type || '';
        const stops = td.num_stops ? ` (${td.num_stops} stops)` : '';
        return `[${vtype || 'transit'} ${line}: ${td.departure_stop?.name} → ${td.arrival_stop?.name}${stops}]`;
      }
      const instr = (s.html_instructions || '').replace(/<[^>]+>/g, '').slice(0, 60);
      return `[${(s.travel_mode||'walk').toLowerCase()}: ${instr}]`;
    }).join(' ');
    return `${mode.toUpperCase()}: ${dur}, ${dist}${fare ? ', ' + fare : ''}. ${steps}`;
  }

  /* ── Build prompt ── */
  function buildPrompt(origin, dest, transit, walking, driving, prefs) {
    const now  = new Date();
    const day  = now.toLocaleDateString('en', { weekday: 'long' });
    const time = now.toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit', hour12: true });
    const prefStr = prefs.length
      ? `User preferences: ${prefs.map(p => ({
          walk: 'wants to walk some of the way',
          scenic: 'wants the scenic or interesting route',
          speed: 'wants to arrive as quickly as possible',
          cheap: 'wants to minimise cost'
        })[p] || p).join('; ')}.`
      : 'No specific preferences.';

    return `Journey: from "${origin}" to "${dest}".
Time: ${day}, ${time}.

${summarise(transit, 'transit')}
${summarise(walking, 'walking')}
${summarise(driving, 'driving/taxi')}

${prefStr}

Think creatively. Don't just give back the three Google modes — consider whether a hybrid makes sense (e.g. transit part-way then walk, or walk to avoid a bad interchange). Always return exactly 3 routes.`;
  }

  /* ── Fetch helpers with 25s timeout ── */
  const fetchWithTimeout = (url, opts = {}, ms = 25000) => {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), ms);
    return fetch(url, { ...opts, signal: ctrl.signal })
      .finally(() => clearTimeout(timer));
  };

  const fetchDirections = (origin, dest, mode) =>
    fetchWithTimeout(`${PROXY}/directions?origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(dest)}&mode=${mode}`)
      .then(r => r.ok ? r.json() : null).catch(() => null);

  const fetchAdvice = prompt =>
    fetchWithTimeout(
